services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fastsam-backend
    ports:
      - "8001:8000"
    volumes:
      - ./models:/app/models
    environment:
      - MODEL_PATH=/app/models/sam2.1_hiera_tiny.pt
      - CHECKPOINT_PATH=/app/models/sam2.1_hiera_tiny.pt
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fastsam-frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  models:
    driver: local